<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RareSignal AI — Rare Disease Intelligence</title>
  <meta name="description"
    content="AI-powered rare disease symptom tracking and signal generation platform for clinicians and patients." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      height: 100%;
    }

    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: #161b22;
    }

    ::-webkit-scrollbar-thumb {
      background: #30363d;
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #484f58;
    }

    input[type="range"] {
      accent-color: #3fb950;
    }

    select option {
      background: #21262d;
    }
  </style>
</head>

<body>
  <div id="root"></div>
</body>

</html>
